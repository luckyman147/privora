name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to keep alive
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
        run: |
          if [ -z "$SUPABASE_URL" ]; then
            echo "Missing Supabase URL. Set NEXT_PUBLIC_SUPABASE_URL as a secret or repository variable."
            exit 1
          fi

          curl -sS -o /dev/null -w "%{http_code}\n" "${SUPABASE_URL}/auth/v1/health"